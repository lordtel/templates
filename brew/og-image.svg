<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="28%" cy="25%" r="95%">
      <stop offset="0%" stop-color="#faf2e4"/>
      <stop offset="100%" stop-color="#e5d8bf"/>
    </radialGradient>
    <radialGradient id="brandDot" cx="30%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#d9b580"/>
      <stop offset="75%" stop-color="#7a3e1d"/>
    </radialGradient>
    <radialGradient id="bean" cx="30%" cy="28%" r="80%">
      <stop offset="0%" stop-color="#b98555"/>
      <stop offset="60%" stop-color="#7a3e1d"/>
      <stop offset="100%" stop-color="#3e1e0b"/>
    </radialGradient>
    <radialGradient id="crema" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#f0d48a" stop-opacity="0.5"/>
      <stop offset="80%" stop-color="#c69652" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Right: espresso bean -->
  <g transform="translate(1000 315)">
    <ellipse cx="0" cy="172" rx="168" ry="12" fill="#2b1b12" opacity="0.07"/>
    <circle r="155" fill="url(#bean)"/>
    <ellipse cx="0" cy="-12" rx="135" ry="125" fill="url(#crema)"/>
    <path d="M -36 -125 C -96 -68 -96 68 -36 125"
          fill="none" stroke="#2b1b12" stroke-opacity="0.45"
          stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- Left: wordmark block -->
  <g transform="translate(80 210)">
    <!-- brand row: dot + CREMA eyebrow -->
    <g>
      <circle cx="8" cy="-8" r="8" fill="url(#brandDot)"/>
      <text x="28" y="-2"
            font-family="Inter"
            font-size="16" font-weight="600" letter-spacing="3.5"
            fill="#7a3e1d">CREMA</text>
    </g>

    <!-- Headline: Fraunces 500 with italic 'dialed in.' accent -->
    <text x="-6" y="92"
          font-family="Fraunces 144pt"
          font-size="94" font-weight="500" fill="#2b1b12"
          letter-spacing="-1.4">Your espresso,</text>
    <text x="-6" y="194"
          font-family="Fraunces 144pt"
          font-size="94" font-style="italic" font-weight="400" fill="#7a3e1d"
          letter-spacing="-1.4">dialed in.</text>

    <!-- Tagline -->
    <text x="-2" y="262"
          font-family="Inter"
          font-size="22" font-weight="400" fill="#6b5443">Log bags. Rate each brew. Tune the recipe.</text>

    <!-- URL strip at bottom -->
    <line x1="-2" y1="338" x2="60" y2="338" stroke="#7a3e1d" stroke-width="2" stroke-linecap="round"/>
    <text x="-2" y="376"
          font-family="Inter"
          font-size="18" font-weight="600" letter-spacing="2"
          fill="#7a3e1d">crema.live</text>
  </g>
</svg>
