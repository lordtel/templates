<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="30%" cy="28%" r="90%">
      <stop offset="0%" stop-color="#faf2e4"/>
      <stop offset="100%" stop-color="#e5d8bf"/>
    </radialGradient>
    <radialGradient id="bean" cx="30%" cy="28%" r="80%">
      <stop offset="0%" stop-color="#b98555"/>
      <stop offset="60%" stop-color="#7a3e1d"/>
      <stop offset="100%" stop-color="#3e1e0b"/>
    </radialGradient>
    <radialGradient id="crema" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#f0d48a" stop-opacity="0.55"/>
      <stop offset="80%" stop-color="#c69652" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g fill="#7a3e1d" opacity="0.05">
    <circle cx="140" cy="80" r="2.5"/>
    <circle cx="1080" cy="560" r="2"/>
    <circle cx="950" cy="70" r="1.5"/>
    <circle cx="220" cy="520" r="2"/>
    <circle cx="620" cy="40" r="1.5"/>
  </g>

  <!-- Right: espresso bean (kept compact so text breathes) -->
  <g transform="translate(1010 315)">
    <ellipse cx="0" cy="170" rx="175" ry="14" fill="#2b1b12" opacity="0.08"/>
    <circle r="160" fill="url(#bean)"/>
    <ellipse cx="0" cy="-10" rx="140" ry="130" fill="url(#crema)"/>
    <path d="M -38 -130 C -100 -70 -100 70 -38 130"
          fill="none" stroke="#2b1b12" stroke-opacity="0.45"
          stroke-width="11" stroke-linecap="round"/>
  </g>

  <!-- Left: wordmark block -->
  <g transform="translate(80 210)">
    <text x="0" y="0"
          font-family="'DejaVu Serif', 'Liberation Serif', Georgia, serif"
          font-size="20" letter-spacing="8" fill="#7a3e1d" font-weight="700">CREMA</text>

    <text x="-4" y="100"
          font-family="'DejaVu Serif', 'Liberation Serif', Georgia, serif"
          font-size="86" font-weight="700" fill="#2b1b12">Your espresso,</text>
    <text x="-4" y="196"
          font-family="'DejaVu Serif', 'Liberation Serif', Georgia, serif"
          font-size="86" font-style="italic" font-weight="400" fill="#2b1b12">dialed in.</text>

    <text x="0" y="258"
          font-family="'DejaVu Sans', 'Liberation Sans', Helvetica, sans-serif"
          font-size="22" fill="#5a4a3a">Log bags · rate each brew · tune your recipe.</text>
  </g>

  <!-- Footer URL strip -->
  <g transform="translate(80 570)">
    <text x="0" y="0"
          font-family="'DejaVu Sans', 'Liberation Sans', Helvetica, sans-serif"
          font-size="20" letter-spacing="3" fill="#7a3e1d" font-weight="700">crema.live</text>
  </g>
</svg>
