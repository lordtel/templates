    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Crema?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Crema is a free espresso journal and coffee-logging progressive web app. Log every coffee bag with a photo, rate espresso, cortado, iced latte, and cappuccino, and get tuned grind suggestions based on your past ratings."
          }
        },
        {
          "@type": "Question",
          "name": "Is Crema free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes — Crema is completely free, ad-free, and has no tracking. There's an optional Buy Me a Coffee link if you'd like to support development."
          }
        },
        {
          "@type": "Question",
          "name": "Does Crema work offline?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Crema is a Progressive Web App with a service worker that caches the full app shell. You can browse previously loaded bags, view ratings, and read your journal offline. Saves sync when you are back online."
          }
        },
        {
          "@type": "Question",
          "name": "How does the OCR work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "OCR runs entirely in your browser using Tesseract.js. Photograph the coffee bag and Crema pre-fills brand, origin, roast level, and weight. Photos never leave your device during scanning."
          }
        },
        {
          "@type": "Question",
          "name": "Can I install Crema on iPhone or Android?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. On iPhone, open crema.live in Safari, tap the Share icon, and choose Add to Home Screen. On Android, open in Chrome, tap the menu, and choose Install app. It launches standalone with its own icon."
          }
        },
        {
          "@type": "Question",
          "name": "What is a dial-in log?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A dial-in log is the recipe you used to brew a specific shot — dose (grams of coffee), yield (grams of espresso), shot time (seconds), grind size, and taste notes. Crema tracks every attempt so you can see which combination nailed that bag."
          }
        }
      ]
    }
    </script>

      <noscript>
        <section style="max-width: 640px; margin: 40px auto; padding: 0 24px;">
          <h2>An espresso journal for the coffee-obsessed.</h2>
          <p>Crema is a lightweight web app for logging coffee bags, rating each brew, and dialing in your espresso over time. Snap a photo of the bag and OCR fills in brand, origin, roast, and weight. Rate every drink — espresso, cortado, iced latte, cappuccino — and Crema suggests a grind setting based on what's worked for you before.</p>
          <p><strong>What you get:</strong></p>
          <ul>
            <li>One page per coffee bag with four rating slots</li>
            <li>Per-bag dial-in companion: dose, yield, shot time, grind, taste, texture</li>
            <li>Analytics: totals, averages, top picks, cost per shot</li>
            <li>Works offline as a Progressive Web App on iPhone and Android</li>
          </ul>
          <p>Crema needs JavaScript. <a href="/docs/press-kit/">See the press kit for screenshots</a> or visit this page in a modern browser.</p>
        </section>
