<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1080" />
  <title>Crema — Stop re-dialing · Instagram story</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="../../../app.css" />
  <link rel="stylesheet" href="../../../features/home/home.css" />
  <link rel="stylesheet" href="../../../features/nav/nav.css" />
  <link rel="stylesheet" href="../screenshots/_frame.css" />
  <style>
    .poster-eyebrow {
      top: 70px;
      font-size: 24px;
      letter-spacing: 0.18em;
    }
    .poster-title {
      top: 118px;
      font-size: 60px;
      line-height: 1.05;
    }
    .poster-tag {
      position: absolute;
      top: 248px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 22px;
      font-weight: 400;
      color: #2b1b12;
      margin: 0;
      font-family: "Inter", sans-serif;
      opacity: 0.85;
    }
    .phone {
      top: 295px;
    }
    .arabica-thumb-bg {
      background: #ffffff !important;
      display: grid !important;
      place-items: center !important;
      position: relative;
    }
    .arabica-thumb-bg::before {
      content: "";
      position: absolute;
      inset: 6px;
      border: 1px solid rgba(0,0,0,0.1);
    }
    .arabica-thumb-pct {
      font-family: "Inter", sans-serif;
      font-size: 26px;
      font-weight: 300;
      color: #0a0a0a;
      letter-spacing: -0.04em;
      line-height: 1;
    }
    .arabica-thumb-name {
      font-family: "Inter", sans-serif;
      font-size: 7px;
      letter-spacing: 0.32em;
      color: #0a0a0a;
      margin-top: 4px;
      text-transform: uppercase;
      font-weight: 400;
    }
  </style>
</head>
<body class="poster">
  <p class="poster-eyebrow">Your shelf</p>
  <h1 class="poster-title">Stop re-dialing the<br/>same bag twice.</h1>
  <p class="poster-tag">Every recipe, remembered.</p>

  <div class="phone">
    <div class="phone-screen">
      <div class="phone-notch"></div>
      <div class="status-bar">
        <span>9:41</span>
        <span class="s-icons">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M2 18h3v-3H2v3zm5 0h3v-6H7v6zm5 0h3V9h-3v9zm5 0h3V4h-3v14z"/></svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M2 9a15 15 0 0 1 20 0"/><path d="M5 12a11 11 0 0 1 14 0"/><path d="M8.5 15a7 7 0 0 1 7 0"/><circle cx="12" cy="18" r="1.2" fill="currentColor"/></svg>
          <svg viewBox="0 0 26 14" fill="none" stroke="currentColor" stroke-width="1.2" aria-hidden="true"><rect x="0.5" y="0.5" width="21" height="13" rx="3"/><rect x="2" y="2" width="17" height="10" rx="2" fill="currentColor"/><rect x="22.5" y="4.5" width="2" height="5" rx="1" fill="currentColor"/></svg>
        </span>
      </div>

      <div class="stage">
        <div class="stage-inner">
          <header class="masthead">
            <a href="#" class="brand" aria-label="Crema home">
              <span class="brand-mark" aria-hidden="true"></span>
              <span class="brand-name">Crema</span>
            </a>
          </header>

          <main class="view" aria-live="polite">
            <div class="page-head">
              <div>
                <p class="eyebrow">Your shelf</p>
                <h1>Coffee bags</h1>
              </div>
              <button class="btn small" type="button">+ Add bag</button>
            </div>

            <div class="shelf-tabs" role="tablist">
              <button type="button" class="shelf-tab on" role="tab" aria-selected="true">
                Active <span class="shelf-tab-count">4</span>
              </button>
              <button type="button" class="shelf-tab" role="tab" aria-selected="false">
                Finished <span class="shelf-tab-count">23</span>
              </button>
            </div>

            <div class="bags">
              <button type="button" class="bag-card">
                <div class="bag-thumb arabica-thumb-bg">
                  <div style="text-align: center; position: relative; z-index: 1;">
                    <div class="arabica-thumb-pct">%</div>
                    <div class="arabica-thumb-name">Arabica</div>
                  </div>
                </div>
                <div class="bag-meta">
                  <h3>% Arabica</h3>
                  <p class="bag-sub">Ethiopia · Washed</p>
                  <div class="bag-row">
                    <span class="pill">Light</span>
                    <span class="bag-dots" aria-label="Average rating 5">
                      <span class="dots">
                        <span class="dot on"></span>
                        <span class="dot on"></span>
                        <span class="dot on"></span>
                        <span class="dot on"></span>
                        <span class="dot on"></span>
                      </span>
                    </span>
                    <span class="bag-price">€22.00 / 200g</span>
                    <span class="bag-price muted">€1.98 / shot</span>
                  </div>
                </div>
              </button>

              <button type="button" class="bag-card">
                <div class="bag-thumb" style="background: linear-gradient(135deg, #3b1f10, #8a4a22);">
                  <span style="font-family: 'Fraunces', serif; font-size: 18px; color: #f0d48a; letter-spacing: 0.14em; transform: rotate(-4deg);">LA CABRA</span>
                </div>
                <div class="bag-meta">
                  <h3>La Cabra</h3>
                  <p class="bag-sub">Ethiopia · Washed</p>
                  <div class="bag-row">
                    <span class="pill">Light</span>
                    <span class="bag-dots" aria-label="Average rating 4.5">
                      <span class="dots">
                        <span class="dot on"></span>
                        <span class="dot on"></span>
                        <span class="dot on"></span>
                        <span class="dot on"></span>
                        <span class="dot on"></span>
                      </span>
                    </span>
                    <span class="bag-price">€19.00 / 250g</span>
                    <span class="bag-price muted">€1.37 / shot</span>
                  </div>
                </div>
              </button>

              <button type="button" class="bag-card">
                <div class="bag-thumb" style="background: linear-gradient(135deg, #dbc8a5, #b08958);">
                  <span style="font-family: 'Fraunces', serif; font-size: 16px; color: #3e2313; letter-spacing: 0.08em;">DROP</span>
                </div>
                <div class="bag-meta">
                  <h3>Drop Coffee</h3>
                  <p class="bag-sub">Colombia · Natural</p>
                  <div class="bag-row">
                    <span class="pill">Medium-light</span>
                    <span class="bag-dots" aria-label="Average rating 4">
                      <span class="dots">
                        <span class="dot on"></span>
                        <span class="dot on"></span>
                        <span class="dot on"></span>
                        <span class="dot on"></span>
                        <span class="dot"></span>
                      </span>
                    </span>
                    <span class="bag-price">€21.00 / 250g</span>
                    <span class="bag-price muted">€1.51 / shot</span>
                  </div>
                </div>
              </button>

              <button type="button" class="bag-card">
                <div class="bag-thumb" style="background: linear-gradient(135deg, #1c1c1c, #3a3a3a); display: grid; place-items: center;">
                  <span style="font-family: 'Fraunces', serif; font-size: 14px; color: #f0d48a; letter-spacing: 0.18em;">APRIL</span>
                </div>
                <div class="bag-meta">
                  <h3>April</h3>
                  <p class="bag-sub">Kenya · Washed</p>
                  <div class="bag-row">
                    <span class="pill">Light</span>
                    <span class="bag-dots" aria-label="Average rating 4.5">
                      <span class="dots">
                        <span class="dot on"></span>
                        <span class="dot on"></span>
                        <span class="dot on"></span>
                        <span class="dot on"></span>
                        <span class="dot on half"></span>
                      </span>
                    </span>
                    <span class="bag-price">€24.00 / 250g</span>
                    <span class="bag-price muted">€1.73 / shot</span>
                  </div>
                </div>
              </button>
            </div>
          </main>

          <nav class="nav" aria-label="Primary" style="position: absolute;">
            <button type="button" class="nav-item is-active">
              <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 7h12l-1 13H7L6 7z"/><path d="M9 7V5a3 3 0 0 1 6 0v2"/></svg></span>
              <span class="nav-label">Bags</span>
            </button>
            <button type="button" class="nav-item primary">
              <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></span>
              <span class="nav-label">Add</span>
            </button>
            <button type="button" class="nav-item">
              <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10M10 20V4M16 20v-8M22 20H2"/></svg></span>
              <span class="nav-label">Stats</span>
            </button>
            <button type="button" class="nav-item">
              <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg></span>
              <span class="nav-label">Gear</span>
            </button>
          </nav>
        </div>
      </div>
    </div>
  </div>

  <p class="poster-url">crema.live</p>
</body>
</html>
