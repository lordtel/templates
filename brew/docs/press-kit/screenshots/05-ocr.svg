<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0e6d2"/>
      <stop offset="1" stop-color="#d8c8a8"/>
    </linearGradient>
    <linearGradient id="screenBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf2e4"/>
      <stop offset="1" stop-color="#f2e6cf"/>
    </linearGradient>
    <linearGradient id="bag" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3e2314"/>
      <stop offset="1" stop-color="#1a0f09"/>
    </linearGradient>
    <linearGradient id="scanline" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#d9b580" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#d9b580" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#d9b580" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1920" fill="url(#pageBg)"/>

  <text x="540" y="110" text-anchor="middle"
        font-family="Inter, sans-serif" font-size="26" font-weight="600"
        letter-spacing="4" fill="#7a3e1d">SNAP → AUTO-FILL</text>
  <text x="540" y="180" text-anchor="middle"
        font-family="Fraunces 144pt, Fraunces, Georgia, serif"
        font-size="60" font-weight="500" fill="#2b1b12"
        letter-spacing="-1.2">OCR reads the label for you</text>

  <rect x="220" y="290" width="640" height="1380" rx="130" fill="#2b1b12" opacity="0.14"/>
  <rect x="230" y="280" width="620" height="1380" rx="124" fill="#1a0f09"/>
  <rect x="240" y="290" width="600" height="1360" rx="114" fill="#0a0604"/>

  <clipPath id="screen5">
    <rect x="252" y="302" width="576" height="1336" rx="102" ry="102"/>
  </clipPath>
  <g clip-path="url(#screen5)">
    <rect x="252" y="302" width="576" height="1336" fill="url(#screenBg)"/>

    <text x="304" y="370" font-family="Inter, sans-serif" font-size="24" font-weight="600" fill="#2b1b12">9:41</text>
    <rect x="450" y="330" width="180" height="44" rx="22" fill="#0a0604"/>

    <text x="300" y="460" font-family="Inter, sans-serif" font-size="15" font-weight="600" letter-spacing="2.5" fill="#7a3e1d">NEW BAG</text>
    <text x="300" y="520" font-family="Fraunces 144pt, Fraunces, Georgia, serif" font-size="46" font-weight="500" fill="#2b1b12" letter-spacing="-1">Log a bag</text>

    <!-- photo with scan animation feel -->
    <g transform="translate(300 560)">
      <rect x="0" y="0" width="480" height="360" rx="20" fill="url(#bag)"/>
      <!-- bag front mock -->
      <rect x="40" y="28" width="400" height="304" rx="10" fill="#2b1b12" stroke="#d9b580" stroke-width="1" stroke-opacity="0.3"/>
      <text x="240" y="124" text-anchor="middle" font-family="Fraunces 144pt, Fraunces, Georgia, serif" font-size="32" font-weight="500" fill="#f0d48a" letter-spacing="2">LA CABRA</text>
      <text x="240" y="170" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" letter-spacing="3" fill="#d9b580" fill-opacity="0.85">ETHIOPIA</text>
      <text x="240" y="200" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" letter-spacing="2" fill="#d9b580" fill-opacity="0.7">HAMBELA · WASHED</text>
      <text x="240" y="244" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" letter-spacing="2" fill="#d9b580" fill-opacity="0.55">BLUEBERRY · JASMINE</text>
      <text x="240" y="266" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" letter-spacing="2" fill="#d9b580" fill-opacity="0.55">MILK CHOCOLATE</text>
      <text x="240" y="306" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" letter-spacing="2" fill="#d9b580" fill-opacity="0.4">250g · 1800 MASL</text>

      <!-- scanning band -->
      <rect x="40" y="174" width="400" height="60" fill="url(#scanline)"/>
      <!-- corner brackets -->
      <g stroke="#f0d48a" stroke-width="3" stroke-linecap="round" fill="none">
        <path d="M 48 40 L 48 70 M 48 40 L 78 40"/>
        <path d="M 432 40 L 432 70 M 432 40 L 402 40"/>
        <path d="M 48 320 L 48 290 M 48 320 L 78 320"/>
        <path d="M 432 320 L 432 290 M 432 320 L 402 320"/>
      </g>
    </g>

    <!-- progress bar -->
    <g transform="translate(300 950)">
      <rect x="0" y="0" width="480" height="8" rx="4" fill="#e9d9be"/>
      <rect x="0" y="0" width="332" height="8" rx="4" fill="#7a3e1d"/>
      <text x="0" y="34" font-family="Inter, sans-serif" font-size="14" fill="#6b5443">Reading label… 69%</text>
    </g>

    <!-- auto-filled fields -->
    <g transform="translate(300 1020)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="13" font-weight="600" letter-spacing="2" fill="#8a6a45">BRAND</text>
      <rect x="0" y="12" width="480" height="56" rx="12" fill="#ffffff" stroke="#d9b580" stroke-width="1.5"/>
      <text x="18" y="48" font-family="Inter, sans-serif" font-size="20" fill="#2b1b12">La Cabra</text>
      <g transform="translate(440 30)"><circle r="14" fill="#7a3e1d"/><path d="M -6 0 L -2 4 L 6 -4" stroke="#faf2e4" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
    </g>

    <g transform="translate(300 1114)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="13" font-weight="600" letter-spacing="2" fill="#8a6a45">ORIGIN</text>
      <rect x="0" y="12" width="230" height="56" rx="12" fill="#ffffff" stroke="#d9b580" stroke-width="1.5"/>
      <text x="18" y="48" font-family="Inter, sans-serif" font-size="20" fill="#2b1b12">Ethiopia</text>
      <g transform="translate(196 30)"><circle r="14" fill="#7a3e1d"/><path d="M -6 0 L -2 4 L 6 -4" stroke="#faf2e4" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
      <g transform="translate(250 0)">
        <text x="0" y="0" font-family="Inter, sans-serif" font-size="13" font-weight="600" letter-spacing="2" fill="#8a6a45">PROCESS</text>
        <rect x="0" y="12" width="230" height="56" rx="12" fill="#ffffff" stroke="#d9b580" stroke-width="1.5"/>
        <text x="18" y="48" font-family="Inter, sans-serif" font-size="20" fill="#2b1b12">Washed</text>
        <g transform="translate(196 30)"><circle r="14" fill="#7a3e1d"/><path d="M -6 0 L -2 4 L 6 -4" stroke="#faf2e4" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
      </g>
    </g>

    <g transform="translate(300 1208)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="13" font-weight="600" letter-spacing="2" fill="#8a6a45">WEIGHT</text>
      <rect x="0" y="12" width="230" height="56" rx="12" fill="#ffffff" stroke="#d9b580" stroke-width="1.5"/>
      <text x="18" y="48" font-family="Inter, sans-serif" font-size="20" fill="#2b1b12">250 g</text>
      <g transform="translate(196 30)"><circle r="14" fill="#7a3e1d"/><path d="M -6 0 L -2 4 L 6 -4" stroke="#faf2e4" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
      <g transform="translate(250 0)">
        <text x="0" y="0" font-family="Inter, sans-serif" font-size="13" font-weight="600" letter-spacing="2" fill="#8a6a45">ALTITUDE</text>
        <rect x="0" y="12" width="230" height="56" rx="12" fill="#ffffff" stroke="#d9b580" stroke-width="1.5"/>
        <text x="18" y="48" font-family="Inter, sans-serif" font-size="20" fill="#2b1b12">1800 masl</text>
        <g transform="translate(196 30)"><circle r="14" fill="#7a3e1d"/><path d="M -6 0 L -2 4 L 6 -4" stroke="#faf2e4" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
      </g>
    </g>

    <!-- helper text -->
    <text x="300" y="1320" font-family="Inter, sans-serif" font-size="15" fill="#6b5443" font-style="italic">6 fields prefilled — review and adjust.</text>

    <!-- save button -->
    <g transform="translate(300 1360)">
      <rect x="0" y="0" width="480" height="64" rx="32" fill="#2b1b12"/>
      <text x="240" y="42" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#faf2e4">Save &amp; dial in →</text>
    </g>

    <!-- bottom nav -->
    <g transform="translate(252 1540)">
      <rect x="0" y="0" width="576" height="98" fill="#ffffff"/>
      <line x1="0" y1="0" x2="576" y2="0" stroke="#e5d8bf" stroke-width="1"/>
    </g>
  </g>

  <text x="540" y="1800" text-anchor="middle"
        font-family="Inter, sans-serif" font-size="22" font-weight="500" letter-spacing="3" fill="#7a3e1d">
    CREMA.LIVE
  </text>
</svg>
