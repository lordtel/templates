<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0e6d2"/>
      <stop offset="1" stop-color="#d8c8a8"/>
    </linearGradient>
    <linearGradient id="screenBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf2e4"/>
      <stop offset="1" stop-color="#f2e6cf"/>
    </linearGradient>
    <radialGradient id="bag" cx="35%" cy="25%" r="85%">
      <stop offset="0%" stop-color="#e9c995"/>
      <stop offset="45%" stop-color="#a56c3f"/>
      <stop offset="100%" stop-color="#3e1e0b"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1920" fill="url(#pageBg)"/>

  <text x="540" y="110" text-anchor="middle"
        font-family="Inter, sans-serif" font-size="26" font-weight="600"
        letter-spacing="4" fill="#7a3e1d">ONE BAG</text>
  <text x="540" y="180" text-anchor="middle"
        font-family="Fraunces 144pt, Fraunces, Georgia, serif"
        font-size="60" font-weight="500" fill="#2b1b12"
        letter-spacing="-1.2">Rate each brew. Watch it learn.</text>

  <rect x="220" y="290" width="640" height="1380" rx="130" fill="#2b1b12" opacity="0.14"/>
  <rect x="230" y="280" width="620" height="1380" rx="124" fill="#1a0f09"/>
  <rect x="240" y="290" width="600" height="1360" rx="114" fill="#0a0604"/>

  <clipPath id="screen2">
    <rect x="252" y="302" width="576" height="1336" rx="102" ry="102"/>
  </clipPath>
  <g clip-path="url(#screen2)">
    <rect x="252" y="302" width="576" height="1336" fill="url(#screenBg)"/>

    <!-- status bar -->
    <text x="304" y="370" font-family="Inter, sans-serif" font-size="24" font-weight="600" fill="#2b1b12">9:41</text>
    <g transform="translate(720 350)">
      <rect x="26" y="2" width="44" height="10" rx="3" fill="none" stroke="#2b1b12" stroke-width="1.5"/>
      <rect x="28" y="4" width="34" height="6" rx="1.5" fill="#2b1b12"/>
    </g>
    <rect x="450" y="330" width="180" height="44" rx="22" fill="#0a0604"/>

    <!-- back -->
    <text x="276" y="440" font-family="Inter, sans-serif" font-size="20" font-weight="500" fill="#7a3e1d">‹ Back</text>

    <!-- bag photo -->
    <g transform="translate(300 470)">
      <rect x="0" y="0" width="480" height="280" rx="20" fill="#2b1b12"/>
      <rect x="40" y="30" width="400" height="230" rx="12" fill="url(#bag)"/>
      <text x="240" y="130" text-anchor="middle"
            font-family="Fraunces 144pt, Fraunces, Georgia, serif"
            font-size="32" font-weight="500" fill="#faf2e4"
            letter-spacing="-0.5">La Cabra</text>
      <text x="240" y="170" text-anchor="middle"
            font-family="Inter, sans-serif" font-size="14" letter-spacing="2" fill="#faf2e4" fill-opacity="0.8">ETHIOPIA · WASHED</text>
    </g>

    <!-- title row -->
    <text x="300" y="798" font-family="Fraunces 144pt, Fraunces, Georgia, serif" font-size="40" font-weight="500" fill="#2b1b12" letter-spacing="-1">La Cabra</text>
    <text x="300" y="836" font-family="Inter, sans-serif" font-size="17" fill="#6b5443">250g · 18€ · 0.07€ / shot</text>

    <!-- dial-in card -->
    <g transform="translate(300 870)">
      <rect x="0" y="0" width="480" height="140" rx="18" fill="#fff8e7" stroke="#e9d9be"/>
      <text x="24" y="38" font-family="Inter, sans-serif" font-size="14" letter-spacing="3" font-weight="600" fill="#7a3e1d">DIAL-IN</text>
      <g transform="translate(336 20)">
        <rect x="0" y="0" width="124" height="30" rx="15" fill="#7a3e1d"/>
        <text x="62" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#faf2e4">Dialed in</text>
      </g>
      <g transform="translate(24 70)" font-family="Inter, sans-serif">
        <g><text font-size="12" font-weight="600" letter-spacing="1.5" fill="#8a6a45">DOSE</text><text y="24" font-size="22" font-weight="600" fill="#2b1b12">18g</text></g>
        <g transform="translate(100 0)"><text font-size="12" font-weight="600" letter-spacing="1.5" fill="#8a6a45">YIELD</text><text y="24" font-size="22" font-weight="600" fill="#2b1b12">38g</text></g>
        <g transform="translate(200 0)"><text font-size="12" font-weight="600" letter-spacing="1.5" fill="#8a6a45">RATIO</text><text y="24" font-size="22" font-weight="600" fill="#2b1b12">1:2.1</text></g>
        <g transform="translate(320 0)"><text font-size="12" font-weight="600" letter-spacing="1.5" fill="#8a6a45">TIME</text><text y="24" font-size="22" font-weight="600" fill="#2b1b12">28s</text></g>
      </g>
    </g>

    <!-- rating slots -->
    <text x="300" y="1068" font-family="Inter, sans-serif" font-size="16" font-weight="600" letter-spacing="2.5" fill="#7a3e1d">BREWS</text>

    <g transform="translate(300 1088)">
      <rect x="0" y="0" width="480" height="86" rx="16" fill="#ffffff" stroke="#e9d9be"/>
      <text x="22" y="38" font-family="Fraunces 144pt, Fraunces, Georgia, serif" font-size="22" font-weight="500" fill="#2b1b12">Espresso</text>
      <g transform="translate(22 54)">
        <circle cx="0" cy="0" r="4" fill="#7a3e1d"/>
        <circle cx="12" cy="0" r="4" fill="#7a3e1d"/>
        <circle cx="24" cy="0" r="4" fill="#7a3e1d"/>
        <circle cx="36" cy="0" r="4" fill="#7a3e1d"/>
        <circle cx="48" cy="0" r="4" fill="#7a3e1d"/>
        <text x="66" y="5" font-family="Inter, sans-serif" font-size="13" fill="#6b5443">grind 3.5 · Apr 18</text>
      </g>
      <text x="458" y="50" text-anchor="end" font-family="Inter, sans-serif" font-size="14" fill="#a38466">→</text>
    </g>

    <g transform="translate(300 1186)">
      <rect x="0" y="0" width="480" height="86" rx="16" fill="#ffffff" stroke="#e9d9be"/>
      <text x="22" y="38" font-family="Fraunces 144pt, Fraunces, Georgia, serif" font-size="22" font-weight="500" fill="#2b1b12">Iced Latte</text>
      <g transform="translate(22 54)">
        <circle cx="0" cy="0" r="4" fill="#7a3e1d"/>
        <circle cx="12" cy="0" r="4" fill="#7a3e1d"/>
        <circle cx="24" cy="0" r="4" fill="#7a3e1d"/>
        <circle cx="36" cy="0" r="4" fill="#7a3e1d"/>
        <circle cx="48" cy="0" r="4" fill="#7a3e1d" fill-opacity="0.28"/>
        <text x="66" y="5" font-family="Inter, sans-serif" font-size="13" fill="#6b5443">grind 4 · Apr 20</text>
      </g>
      <text x="458" y="50" text-anchor="end" font-family="Inter, sans-serif" font-size="14" fill="#a38466">→</text>
    </g>

    <g transform="translate(300 1284)">
      <rect x="0" y="0" width="480" height="86" rx="16" fill="#ffffff" stroke="#e9d9be" stroke-dasharray="6 6"/>
      <text x="22" y="38" font-family="Fraunces 144pt, Fraunces, Georgia, serif" font-size="22" font-weight="500" fill="#2b1b12">Cappuccino</text>
      <text x="22" y="62" font-family="Inter, sans-serif" font-size="13" fill="#8a6a45">Try grind 3.5 · from 2 ratings</text>
      <text x="458" y="50" text-anchor="end" font-family="Inter, sans-serif" font-size="14" fill="#a38466">Rate →</text>
    </g>

    <g transform="translate(300 1382)">
      <rect x="0" y="0" width="480" height="86" rx="16" fill="#ffffff" stroke="#e9d9be" stroke-dasharray="6 6"/>
      <text x="22" y="38" font-family="Fraunces 144pt, Fraunces, Georgia, serif" font-size="22" font-weight="500" fill="#2b1b12">Iced Americano</text>
      <text x="22" y="62" font-family="Inter, sans-serif" font-size="13" fill="#8a6a45">Try grind 3 to start</text>
      <text x="458" y="50" text-anchor="end" font-family="Inter, sans-serif" font-size="14" fill="#a38466">Rate →</text>
    </g>

    <!-- bottom nav -->
    <g transform="translate(252 1540)">
      <rect x="0" y="0" width="576" height="98" fill="#ffffff"/>
      <line x1="0" y1="0" x2="576" y2="0" stroke="#e5d8bf" stroke-width="1"/>
    </g>
  </g>

  <text x="540" y="1800" text-anchor="middle"
        font-family="Inter, sans-serif" font-size="22" font-weight="500" letter-spacing="3" fill="#7a3e1d">
    CREMA.LIVE
  </text>
</svg>
