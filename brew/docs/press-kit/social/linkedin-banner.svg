<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <radialGradient id="bg" cx="22%" cy="30%" r="95%">
      <stop offset="0%" stop-color="#faf2e4"/>
      <stop offset="100%" stop-color="#e5d8bf"/>
    </radialGradient>
    <radialGradient id="bean" cx="30%" cy="28%" r="80%">
      <stop offset="0%" stop-color="#b98555"/>
      <stop offset="60%" stop-color="#7a3e1d"/>
      <stop offset="100%" stop-color="#3e1e0b"/>
    </radialGradient>
    <radialGradient id="crema" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#f0d48a" stop-opacity="0.5"/>
      <stop offset="80%" stop-color="#c69652" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dot" cx="30%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#d9b580"/>
      <stop offset="75%" stop-color="#7a3e1d"/>
    </radialGradient>
  </defs>
  <rect width="1584" height="396" fill="url(#bg)"/>

  <!-- Bean right -->
  <g transform="translate(1340 198)">
    <ellipse cx="0" cy="118" rx="118" ry="8" fill="#2b1b12" opacity="0.08"/>
    <circle r="108" fill="url(#bean)"/>
    <ellipse cx="0" cy="-8" rx="94" ry="86" fill="url(#crema)"/>
    <path d="M -26 -86 C -68 -48 -68 48 -26 86"
          fill="none" stroke="#2b1b12" stroke-opacity="0.45"
          stroke-width="7.5" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(100 150)">
    <g>
      <circle cx="8" cy="-8" r="8" fill="url(#dot)"/>
      <text x="28" y="-2"
            font-family="Inter, sans-serif"
            font-size="15" font-weight="600" letter-spacing="3.5"
            fill="#7a3e1d">CREMA</text>
    </g>
    <text x="-4" y="72"
          font-family="Fraunces 144pt, Fraunces, Georgia, serif"
          font-size="68" font-weight="500" fill="#2b1b12"
          letter-spacing="-1.2">A quiet espresso journal.</text>
    <text x="-2" y="130"
          font-family="Inter, sans-serif"
          font-size="20" font-weight="400" fill="#6b5443">Log bags. Rate each brew. Tune the recipe. · crema.live</text>
  </g>
</svg>
