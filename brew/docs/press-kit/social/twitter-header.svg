<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <radialGradient id="bg" cx="20%" cy="30%" r="95%">
      <stop offset="0%" stop-color="#faf2e4"/>
      <stop offset="100%" stop-color="#e5d8bf"/>
    </radialGradient>
    <radialGradient id="bean" cx="30%" cy="28%" r="80%">
      <stop offset="0%" stop-color="#b98555"/>
      <stop offset="60%" stop-color="#7a3e1d"/>
      <stop offset="100%" stop-color="#3e1e0b"/>
    </radialGradient>
    <radialGradient id="crema" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#f0d48a" stop-opacity="0.5"/>
      <stop offset="80%" stop-color="#c69652" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dot" cx="30%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#d9b580"/>
      <stop offset="75%" stop-color="#7a3e1d"/>
    </radialGradient>
  </defs>
  <rect width="1500" height="500" fill="url(#bg)"/>

  <!-- Right: large bean -->
  <g transform="translate(1200 250)">
    <ellipse cx="0" cy="140" rx="140" ry="10" fill="#2b1b12" opacity="0.08"/>
    <circle r="130" fill="url(#bean)"/>
    <ellipse cx="0" cy="-10" rx="112" ry="104" fill="url(#crema)"/>
    <path d="M -30 -102 C -80 -58 -80 58 -30 102"
          fill="none" stroke="#2b1b12" stroke-opacity="0.45"
          stroke-width="9" stroke-linecap="round"/>
  </g>

  <!-- Small beans decoration -->
  <g transform="translate(880 150)" opacity="0.35">
    <circle r="24" fill="url(#bean)"/>
    <path d="M -6 -20 C -14 -12 -14 12 -6 20" fill="none" stroke="#2b1b12" stroke-opacity="0.5" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g transform="translate(960 360)" opacity="0.3">
    <circle r="18" fill="url(#bean)"/>
    <path d="M -5 -14 C -11 -8 -11 8 -5 14" fill="none" stroke="#2b1b12" stroke-opacity="0.5" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Left: headline -->
  <g transform="translate(80 180)">
    <g>
      <circle cx="8" cy="-8" r="8" fill="url(#dot)"/>
      <text x="28" y="-2"
            font-family="Inter, sans-serif"
            font-size="16" font-weight="600" letter-spacing="3.5"
            fill="#7a3e1d">CREMA</text>
    </g>
    <text x="-4" y="84"
          font-family="Fraunces 144pt, Fraunces, Georgia, serif"
          font-size="82" font-weight="500" fill="#2b1b12"
          letter-spacing="-1.2">Your espresso,</text>
    <text x="-4" y="172"
          font-family="Fraunces 144pt, Fraunces, Georgia, serif"
          font-size="82" font-weight="400" font-style="italic" fill="#7a3e1d"
          letter-spacing="-1.2">dialed in.</text>
    <text x="-2" y="228"
          font-family="Inter, sans-serif"
          font-size="20" font-weight="400" fill="#6b5443">Log bags · Rate brews · Tune the recipe · crema.live</text>
  </g>
</svg>
