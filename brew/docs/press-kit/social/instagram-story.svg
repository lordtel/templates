<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <radialGradient id="bg" cx="28%" cy="18%" r="100%">
      <stop offset="0%" stop-color="#faf2e4"/>
      <stop offset="100%" stop-color="#e5d8bf"/>
    </radialGradient>
    <radialGradient id="bean" cx="30%" cy="28%" r="80%">
      <stop offset="0%" stop-color="#b98555"/>
      <stop offset="60%" stop-color="#7a3e1d"/>
      <stop offset="100%" stop-color="#3e1e0b"/>
    </radialGradient>
    <radialGradient id="crema" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#f0d48a" stop-opacity="0.5"/>
      <stop offset="80%" stop-color="#c69652" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dot" cx="30%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#d9b580"/>
      <stop offset="75%" stop-color="#7a3e1d"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1920" fill="url(#bg)"/>

  <!-- Brand eyebrow -->
  <g transform="translate(540 260)">
    <g transform="translate(-80 0)">
      <circle cx="10" cy="10" r="10" fill="url(#dot)"/>
      <text x="34" y="18"
            font-family="Inter, sans-serif"
            font-size="22" font-weight="600" letter-spacing="4.5"
            fill="#7a3e1d">CREMA</text>
    </g>
  </g>

  <!-- Bean center -->
  <g transform="translate(540 780)">
    <ellipse cx="0" cy="230" rx="230" ry="14" fill="#2b1b12" opacity="0.08"/>
    <circle r="210" fill="url(#bean)"/>
    <ellipse cx="0" cy="-14" rx="180" ry="168" fill="url(#crema)"/>
    <path d="M -50 -168 C -130 -96 -130 96 -50 168"
          fill="none" stroke="#2b1b12" stroke-opacity="0.45"
          stroke-width="14" stroke-linecap="round"/>
  </g>

  <!-- Headline -->
  <text x="540" y="1250" text-anchor="middle"
        font-family="Fraunces 144pt, Fraunces, Georgia, serif"
        font-size="104" font-weight="500" fill="#2b1b12"
        letter-spacing="-1.4">Your espresso,</text>
  <text x="540" y="1370" text-anchor="middle"
        font-family="Fraunces 144pt, Fraunces, Georgia, serif"
        font-size="104" font-weight="400" font-style="italic" fill="#7a3e1d"
        letter-spacing="-1.4">dialed in.</text>

  <!-- Tagline -->
  <text x="540" y="1440" text-anchor="middle"
        font-family="Inter, sans-serif"
        font-size="28" font-weight="400" fill="#6b5443">Log bags. Rate each brew. Tune the recipe.</text>

  <!-- CTA pill -->
  <g transform="translate(540 1620)">
    <rect x="-210" y="-46" width="420" height="92" rx="46" fill="#2b1b12"/>
    <text x="0" y="8" text-anchor="middle"
          font-family="Inter, sans-serif"
          font-size="30" font-weight="600" letter-spacing="0.5"
          fill="#faf2e4">Try it · crema.live</text>
  </g>

  <!-- Footer -->
  <text x="540" y="1820" text-anchor="middle"
        font-family="Inter, sans-serif"
        font-size="18" font-weight="500" letter-spacing="3" fill="#7a3e1d">
    FREE · NO ADS · GUEST MODE
  </text>
</svg>
