<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <radialGradient id="bg" cx="28%" cy="20%" r="95%">
      <stop offset="0%" stop-color="#faf2e4"/>
      <stop offset="100%" stop-color="#e5d8bf"/>
    </radialGradient>
    <radialGradient id="bean" cx="30%" cy="28%" r="80%">
      <stop offset="0%" stop-color="#b98555"/>
      <stop offset="60%" stop-color="#7a3e1d"/>
      <stop offset="100%" stop-color="#3e1e0b"/>
    </radialGradient>
    <radialGradient id="crema" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#f0d48a" stop-opacity="0.5"/>
      <stop offset="80%" stop-color="#c69652" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dot" cx="30%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#d9b580"/>
      <stop offset="75%" stop-color="#7a3e1d"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Bean -->
  <g transform="translate(540 460)">
    <ellipse cx="0" cy="220" rx="218" ry="14" fill="#2b1b12" opacity="0.08"/>
    <circle r="200" fill="url(#bean)"/>
    <ellipse cx="0" cy="-14" rx="172" ry="158" fill="url(#crema)"/>
    <path d="M -46 -158 C -122 -90 -122 90 -46 158"
          fill="none" stroke="#2b1b12" stroke-opacity="0.45"
          stroke-width="13" stroke-linecap="round"/>
  </g>

  <!-- Brand eyebrow -->
  <g transform="translate(540 100)">
    <g transform="translate(-70 0)">
      <circle cx="10" cy="10" r="10" fill="url(#dot)"/>
      <text x="34" y="18"
            font-family="Inter, sans-serif"
            font-size="20" font-weight="600" letter-spacing="4"
            fill="#7a3e1d">CREMA</text>
    </g>
  </g>

  <!-- Headline -->
  <text x="540" y="820" text-anchor="middle"
        font-family="Fraunces 144pt, Fraunces, Georgia, serif"
        font-size="98" font-weight="500" fill="#2b1b12"
        letter-spacing="-1.4">Your espresso,</text>
  <text x="540" y="930" text-anchor="middle"
        font-family="Fraunces 144pt, Fraunces, Georgia, serif"
        font-size="98" font-weight="400" font-style="italic" fill="#7a3e1d"
        letter-spacing="-1.4">dialed in.</text>

  <!-- URL -->
  <line x1="480" y1="1000" x2="600" y2="1000" stroke="#7a3e1d" stroke-width="2" stroke-linecap="round"/>
  <text x="540" y="1032" text-anchor="middle"
        font-family="Inter, sans-serif"
        font-size="20" font-weight="600" letter-spacing="3"
        fill="#7a3e1d">CREMA.LIVE</text>
</svg>
